<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - وڈرا کلیمز</title>
    <style>
        body { background: #0A0A0A; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #1A1A1A; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        h1 { color: #00C853; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #00C853; color: black; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        .btn-refresh { width: 100%; padding: 12px; background: #F0B90B; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .empty { text-align: center; color: #888; padding: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ ایڈمن پینل - وڈرا کلیمز</h1>
        <button class="btn-refresh" onclick="loadData()">🔄 ڈیٹا ریفریش کریں</button>
        <div id="data-table" style="margin-top: 15px;"></div>
    </div>
    <script>
        function loadData() {
            const claims = JSON.parse(localStorage.getItem('allWithdrawals')) || [];
            const container = document.getElementById('data-table');

            if (claims.length === 0) {
                container.innerHTML = `<div class="empty">ابھی تک کوئی وڈرا کلیم نہیں ہوا۔</div>`;
                return;
            }

            let html = `
                <table>
                    <tr>
                        <th>#</th>
                        <th>صارف</th>
                        <th>اکاؤنٹ</th>
                        <th>طریقہ</th>
                        <th>رقم</th>
                        <th>وقت</th>
                    </tr>
            `;
            claims.slice().reverse().forEach((c, i) => {
                html += `
                    <tr>
                        <td>${i+1}</td>
                        <td style="color: #00C853;">${c.user}</td>
                        <td>${c.accNum}</td>
                        <td>${c.method}</td>
                        <td style="color: #F0B90B;">Rs. ${c.amount}</td>
                        <td style="font-size: 0.8rem;">${c.time}</td>
                    </tr>
                `;
            });
            html += `</table>`;
            container.innerHTML = html;
        }
        window.onload = loadData;
    </script>
</body>
</html>
